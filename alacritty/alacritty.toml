[window]
padding = { x = 3, y = 3 }
dynamic_padding = true
decorations = "None"
startup_mode = "Maximized"
option_as_alt = "OnlyLeft"
# opacity = 0.96

[font]
size = 16
normal = { family = "Liga SFMono Nerd Font", style = "Regular" }
# Liga SFMono Nerd Font only
bold = { style = "SemiBold" }
bold_italic = { style = "SemiBold Italic" }

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
{ key = "|", mods = "Control|Shift", action = "ToggleViMode" },
{ key = "U", mode = "Vi|~Search", action = "Up" },
{ key = "E", mode = "Vi|~Search", action = "Down" },
{ key = "N", mode = "Vi|~Search", action = "Left" },
{ key = "I", mode = "Vi|~Search", action = "Right" },
{ key = "K", mode = "Vi|~Search", action = "ToggleViMode" },
{ key = "J", mode = "Vi|~Search", action = "SemanticRightEnd" },
{ key = "J", mods = "Shift", mode = "Vi|~Search", action = "WordRightEnd" },
{ key = "H", mode = "Vi|~Search", action = "SearchNext" },
{ key = "H", mods = "Shift", mode = "Vi|~Search", action = "SearchPrevious" },
]

# Colors (Tokyo Night)
# Source https//github.com/zatchheems/tokyo-night-alacritty-theme

# Default colors
[colors.primary]
background = '#1a1b26'
foreground = '#a9b1d6'

# Normal colors
[colors.normal]
black   = '#32344a'
red     = '#f7768e'
green   = '#9ece6a'
yellow  = '#e0af68'
blue    = '#7aa2f7'
magenta = '#ad8ee6'
cyan    = '#449dab'
white   = '#787c99'

# Bright colors
[colors.bright]
black   = '#444b6a'
red     = '#ff7a93'
green   = '#b9f27c'
yellow  = '#ff9e64'
blue    = '#7da6ff'
magenta = '#bb9af7'
cyan    = '#0db9d7'
white   = '#acb0d0'
